<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Intelligence Dashboard - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0a0e1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Loading and Error States */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #1a1f2e;
            border-top-color: #00e5ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background-color: #4a1a1a;
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-left: 4px solid #ff6b6b;
        }

        .success-message {
            background-color: #1a4a2a;
            color: #51cf66;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-left: 4px solid #51cf66;
        }

        .warning-message {
            background-color: #4a3a1a;
            color: #ffd93d;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-left: 4px solid #ffd93d;
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
        }

        .login-form {
            background-color: #1a1f2e;
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a2f3e;
        }

        .login-form h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00e5ff;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background-color: #0a0e1a;
            border: 1px solid #2a2f3e;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            padding: 10px 16px;
            background-color: #00e5ff;
            color: #0a0e1a;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #00c9d7;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #2a2f3e;
            color: #a0a0a0;
            cursor: not-allowed;
            transform: none;
        }

        .button-secondary {
            background-color: #2a2f3e;
            color: #e0e0e0;
        }

        .button-secondary:hover {
            background-color: #3a3f4e;
        }

        .button-danger {
            background-color: #ff6b6b;
            color: white;
        }

        .button-danger:hover {
            background-color: #ff5252;
        }

        .button-success {
            background-color: #51cf66;
            color: #0a0e1a;
        }

        .button-success:hover {
            background-color: #37b24d;
        }

        .button-full-width {
            width: 100%;
        }

        /* Admin Panel */
        .admin-panel {
            min-height: 100vh;
        }

        .header {
            background-color: #1a1f2e;
            border-bottom: 1px solid #2a2f3e;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #00e5ff;
            font-size: 24px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            font-size: 14px;
            color: #a0a0a0;
        }

        .user-info .email {
            color: #00e5ff;
            font-weight: 600;
        }

        .user-info .role {
            display: inline-block;
            background-color: #2a2f3e;
            padding: 4px 8px;
            border-radius: 3px;
            margin-left: 8px;
            color: #51cf66;
            font-size: 12px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #1a1f2e;
            border-bottom: 1px solid #2a2f3e;
            gap: 0;
        }

        .tab-button {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            text-align: center;
        }

        .tab-button:hover {
            color: #00e5ff;
            background-color: transparent;
            transform: none;
        }

        .tab-button.active {
            color: #00e5ff;
            border-bottom-color: #00e5ff;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 4px;
            overflow: hidden;
        }

        thead {
            background-color: #0f1218;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            color: #00e5ff;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2f3e;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2f3e;
        }

        tbody tr:hover {
            background-color: #262c3e;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-pending {
            background-color: #4a3a1a;
            color: #ffd93d;
        }

        .status-approved {
            background-color: #1a4a2a;
            color: #51cf66;
        }

        .status-denied {
            background-color: #4a1a1a;
            color: #ff6b6b;
        }

        .status-suspended {
            background-color: #2a2a3a;
            color: #9a9aaa;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .role-admin {
            background-color: #ff6b6b;
            color: white;
        }

        .role-moderator {
            background-color: #ffd93d;
            color: #0a0e1a;
        }

        .role-user {
            background-color: #2a2f3e;
            color: #a0a0a0;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #00e5ff;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #00e5ff;
        }

        /* Permissions Editor */
        .permissions-section {
            margin-bottom: 20px;
            padding: 16px;
            background-color: #0a0e1a;
            border-radius: 4px;
            border: 1px solid #2a2f3e;
        }

        .permissions-section h3 {
            color: #00e5ff;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00e5ff;
        }

        .checkbox-item label {
            cursor: pointer;
            margin: 0;
            font-size: 14px;
            color: #e0e0e0;
        }

        .state-section {
            margin-bottom: 16px;
            padding: 12px;
            background-color: #1a1f2e;
            border-radius: 3px;
            border: 1px solid #2a2f3e;
        }

        .state-section h4 {
            color: #a0a0a0;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .nested-checkboxes {
            margin-left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }

        .empty-state h3 {
            color: #e0e0e0;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .empty-state p {
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Form layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #2a2f3e;
        }

        .modal-actions button {
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header-right {
                flex-direction: column;
                width: 100%;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-button {
                flex: 0 1 auto;
                padding: 12px;
                font-size: 12px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
                padding: 20px;
            }
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 12px;
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="auth-container">
        <div class="login-form">
            <h1>Admin Panel</h1>
            <div id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="button-full-width" id="loginBtn">
                    Log In
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display: none;">
        <div class="header">
            <h1>Election Intelligence Dashboard - Admin Panel</h1>
            <div class="header-right">
                <div class="user-info">
                    <span>Logged in as:</span>
                    <span class="email" id="currentEmail"></span>
                    <span class="role" id="currentRole"></span>
                </div>
                <button class="button-secondary logout-btn" id="logoutBtn">Log Out</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-button active" data-tab="pending">Pending Approvals</button>
            <button class="tab-button" data-tab="users">User Management</button>
            <button class="tab-button" data-tab="create">Create User</button>
        </div>

        <!-- Pending Approvals Tab -->
        <div id="pending" class="tab-content active">
            <div id="pendingContent"></div>
        </div>

        <!-- User Management Tab -->
        <div id="users" class="tab-content">
            <div id="usersContent"></div>
        </div>

        <!-- Create User Tab -->
        <div id="create" class="tab-content">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 style="color: #00e5ff; margin-bottom: 20px;">Create New User</h2>
                <div id="createError"></div>
                <div id="createSuccess"></div>
                <form id="createUserForm">
                    <div class="form-group">
                        <label for="newEmail">Email</label>
                        <input type="email" id="newEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Password</label>
                        <input type="password" id="newPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="newFullName">Full Name</label>
                        <input type="text" id="newFullName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="newRole">Role</label>
                        <select id="newRole" name="role" required>
                            <option value="user">User</option>
                            <option value="moderator">Moderator</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="permissions-section">
                        <h3>Geographic Permissions</h3>
                        <div id="createStateCheckboxes" class="checkbox-group"></div>
                    </div>

                    <div class="permissions-section">
                        <h3>Specific District Restrictions (Optional)</h3>
                        <div class="form-group">
                            <label for="createDistricts">District IDs (comma-separated, e.g., "HD1,HD2,HD15")</label>
                            <textarea id="createDistricts" name="districts" placeholder="Leave empty for all districts"></textarea>
                        </div>
                    </div>

                    <button type="submit" class="button-success button-full-width">
                        Create User
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit User Permissions</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div id="editError"></div>
            <form id="editForm">
                <input type="hidden" id="editUserId">

                <div class="form-group">
                    <label>User Email</label>
                    <input type="text" id="editEmail" disabled>
                </div>

                <div class="form-group">
                    <label for="editRole">Role</label>
                    <select id="editRole" name="role">
                        <option value="user">User</option>
                        <option value="moderator">Moderator</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="permissions-section">
                    <h3>State Access</h3>
                    <div id="editStateCheckboxes" class="checkbox-group"></div>
                </div>

                <div class="permissions-section">
                    <h3>Race Type Access by State</h3>
                    <div id="editRaceTypes"></div>
                </div>

                <div class="permissions-section">
                    <h3>Specific District Restrictions (Optional)</h3>
                    <div class="form-group">
                        <label for="editDistricts">District IDs (comma-separated, e.g., "HD1,HD2,HD15")</label>
                        <textarea id="editDistricts" name="districts" placeholder="Leave empty for all districts"></textarea>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="button-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="button-success">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://rklhazfezymvdvmpwvlz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrbGhhemZlenltdmR2bXB3dmx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODEwOTcsImV4cCI6MjA4OTY1NzA5N30.WkWcehjIhBQsD7z7K7Ji2viqzNvK8G0LFkg8XVkV5-E';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Constants
        const STATES = ['Oregon', 'Utah', 'Vermont'];
        const STATES_ABBREV = { 'Oregon': 'OR', 'Utah': 'UT', 'Vermont': 'VT' };
        const RACE_TYPES = ['HD', 'SD', 'FED', 'SW'];

        // State Management
        let currentUser = null;
        let currentUserRole = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthentication();
            setupEventListeners();
        });

        // Authentication
        async function checkAuthentication() {
            try {
                const { data: { session } } = await supabase.auth.getSession();

                if (session) {
                    const user = session.user;
                    const profile = await getUserProfile(user.id);

                    if (profile && (profile.role === 'admin' || profile.role === 'moderator')) {
                        currentUser = user;
                        currentUserRole = profile.role;
                        showAdminPanel();
                        loadPendingApprovals();
                        initializePermissionsUI();
                    } else {
                        logout();
                        showError('loginError', 'Access denied. Admin or moderator role required.');
                    }
                } else {
                    showLoginScreen();
                }
            } catch (error) {
                console.error('Auth check error:', error);
                showLoginScreen();
            }
        }

        async function getUserProfile(userId) {
            try {
                const { data, error } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;
                return data;
            } catch (error) {
                console.error('Error fetching user profile:', error);
                return null;
            }
        }

        async function login(email, password) {
            try {
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="loading-spinner"></span>';

                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                const profile = await getUserProfile(data.user.id);
                if (!profile || (profile.role !== 'admin' && profile.role !== 'moderator')) {
                    await supabase.auth.signOut();
                    throw new Error('Access denied. Admin or moderator role required.');
                }

                currentUser = data.user;
                currentUserRole = profile.role;
                showAdminPanel();
                loadPendingApprovals();
                initializePermissionsUI();
            } catch (error) {
                showError('loginError', error.message || 'Login failed');
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').innerHTML = 'Log In';
            }
        }

        async function logout() {
            try {
                await supabase.auth.signOut();
                currentUser = null;
                currentUserRole = null;
                showLoginScreen();
            } catch (error) {
                console.error('Logout error:', error);
                showLoginScreen();
            }
        }

        // UI Functions
        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('currentEmail').textContent = currentUser.email;
            document.getElementById('currentRole').textContent = currentUserRole;
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
            }
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="success-message">${escapeHtml(message)}</div>`;
                setTimeout(() => {
                    element.innerHTML = '';
                }, 5000);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await login(email, password);
            });

            document.getElementById('logoutBtn').addEventListener('click', logout);

            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.dataset.tab;
                    switchTab(tabName);
                });
            });

            document.getElementById('createUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await createNewUser();
            });

            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveUserChanges();
            });

            document.getElementById('closeModalBtn').addEventListener('click', closeEditModal);
            document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);

            document.getElementById('editModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('editModal')) {
                    closeEditModal();
                }
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'pending') {
                loadPendingApprovals();
            } else if (tabName === 'users') {
                loadUsers();
            }
        }

        // Permissions UI
        function initializePermissionsUI() {
            renderStateCheckboxes('createStateCheckboxes', []);
            renderStateCheckboxes('editStateCheckboxes', []);
        }

        function renderStateCheckboxes(containerId, allowedStates) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            STATES.forEach(state => {
                const abbrev = STATES_ABBREV[state];
                const checked = allowedStates.includes(abbrev);

                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="${containerId}_${abbrev}" value="${abbrev}" ${checked ? 'checked' : ''}>
                    <label for="${containerId}_${abbrev}">${state}</label>
                `;

                container.appendChild(div);
            });
        }

        function renderRaceTypeSelection(allowedStates, raceTypeData) {
            const container = document.getElementById('editRaceTypes');
            container.innerHTML = '';

            STATES.forEach(state => {
                const abbrev = STATES_ABBREV[state];
                if (!allowedStates.includes(abbrev)) return;

                const section = document.createElement('div');
                section.className = 'state-section';

                const heading = document.createElement('h4');
                heading.textContent = state;
                section.appendChild(heading);

                const raceDiv = document.createElement('div');
                raceDiv.className = 'nested-checkboxes';

                const stateRaceTypes = raceTypeData[abbrev] || [];

                RACE_TYPES.forEach(race => {
                    const checked = stateRaceTypes.includes(race);
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    div.innerHTML = `
                        <input type="checkbox" class="race-type-checkbox" data-state="${abbrev}" value="${race}" ${checked ? 'checked' : ''}>
                        <label>${race}</label>
                    `;
                    raceDiv.appendChild(div);
                });

                section.appendChild(raceDiv);
                container.appendChild(section);
            });
        }

        function getSelectedStates(containerId) {
            const states = [];
            document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`).forEach(checkbox => {
                states.push(checkbox.value);
            });
            return states;
        }

        function getRaceTypeData() {
            const data = {};
            document.querySelectorAll('.race-type-checkbox:checked').forEach(checkbox => {
                const state = checkbox.dataset.state;
                if (!data[state]) data[state] = [];
                data[state].push(checkbox.value);
            });

            STATES.forEach(state => {
                const abbrev = STATES_ABBREV[state];
                if (!data[abbrev]) data[abbrev] = [];
            });

            return data;
        }

        // Pending Approvals
        async function loadPendingApprovals() {
            try {
                const content = document.getElementById('pendingContent');
                content.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div></div>';

                const { data, error } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    content.innerHTML = '<div class="empty-state"><h3>No pending approvals</h3><p>All users have been reviewed.</p></div>';
                    return;
                }

                let html = '<table><thead><tr><th>Email</th><th>Full Name</th><th>Created At</th><th>Actions</th></tr></thead><tbody>';

                data.forEach(user => {
                    const createdAt = new Date(user.created_at).toLocaleDateString();
                    html += `
                        <tr>
                            <td>${escapeHtml(user.email)}</td>
                            <td>${escapeHtml(user.full_name || 'N/A')}</td>
                            <td>${createdAt}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="button-success" onclick="approveUser('${escapeHtml(user.id)}')">Approve</button>
                                    <button class="button-danger" onclick="denyUser('${escapeHtml(user.id)}')">Deny</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                content.innerHTML = html;
            } catch (error) {
                console.error('Error loading pending approvals:', error);
                document.getElementById('pendingContent').innerHTML = '<div class="error-message">Failed to load pending approvals</div>';
            }
        }

        async function approveUser(userId) {
            try {
                const { error } = await supabase
                    .from('user_profiles')
                    .update({
                        status: 'approved',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) throw error;

                loadPendingApprovals();
                showSuccess('pendingContent', 'User approved successfully');
            } catch (error) {
                showError('pendingContent', 'Failed to approve user: ' + error.message);
            }
        }

        async function denyUser(userId) {
            if (!confirm('Are you sure you want to deny this user?')) return;

            try {
                const { error } = await supabase
                    .from('user_profiles')
                    .update({
                        status: 'denied',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) throw error;

                loadPendingApprovals();
                showSuccess('pendingContent', 'User denied successfully');
            } catch (error) {
                showError('pendingContent', 'Failed to deny user: ' + error.message);
            }
        }

        // User Management
        async function loadUsers() {
            try {
                const content = document.getElementById('usersContent');
                content.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div></div>';

                const { data, error } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .in('status', ['approved', 'suspended'])
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    content.innerHTML = '<div class="empty-state"><h3>No users found</h3><p>There are no approved users yet.</p></div>';
                    return;
                }

                let html = '<table><thead><tr><th>Email</th><th>Full Name</th><th>Role</th><th>Status</th><th>States</th><th>Actions</th></tr></thead><tbody>';

                data.forEach(user => {
                    const states = (user.allowed_states || []).join(', ') || 'None';
                    const statusClass = `status-${user.status}`;
                    const roleClass = `role-${user.role}`;

                    html += `
                        <tr>
                            <td>${escapeHtml(user.email)}</td>
                            <td>${escapeHtml(user.full_name || 'N/A')}</td>
                            <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                            <td><span class="status-badge ${statusClass}">${user.status}</span></td>
                            <td>${escapeHtml(states)}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="button-secondary" onclick="editUser('${escapeHtml(user.id)}')">Edit</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                content.innerHTML = html;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersContent').innerHTML = '<div class="error-message">Failed to load users</div>';
            }
        }

        async function editUser(userId) {
            try {
                const { data, error } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                // Check permissions
                if (currentUserRole === 'moderator' && data.role !== 'user') {
                    showError('editError', 'Moderators can only edit user-level accounts');
                    return;
                }

                document.getElementById('editUserId').value = data.id;
                document.getElementById('editEmail').value = data.email;
                document.getElementById('editRole').value = data.role;
                document.getElementById('editDistricts').value =
                    data.allowed_districts && Object.values(data.allowed_districts).flat().length > 0
                    ? Object.values(data.allowed_districts).flat().join(',')
                    : '';

                const allowedStates = data.allowed_states || [];
                renderStateCheckboxes('editStateCheckboxes', allowedStates);
                renderRaceTypeSelection(allowedStates, data.allowed_race_types || {});

                // Disable role selector if user is moderator
                document.getElementById('editRole').disabled = currentUserRole === 'moderator';

                // Show modal
                document.getElementById('editModal').classList.add('active');
                document.getElementById('editError').innerHTML = '';
            } catch (error) {
                showError('editError', 'Failed to load user: ' + error.message);
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editError').innerHTML = '';
        }

        async function saveUserChanges() {
            try {
                const userId = document.getElementById('editUserId').value;
                const role = document.getElementById('editRole').value;
                const allowedStates = getSelectedStates('editStateCheckboxes');
                const allowedRaceTypes = getRaceTypeData();
                const districtInput = document.getElementById('editDistricts').value.trim();

                let allowedDistricts = {};
                if (districtInput) {
                    const districts = districtInput.split(',').map(d => d.trim()).filter(d => d);
                    allowedStates.forEach(state => {
                        allowedDistricts[state] = districts.filter(d => d.startsWith(state.substring(0, 2)));
                    });
                } else {
                    allowedStates.forEach(state => {
                        allowedDistricts[state] = [];
                    });
                }

                const updateData = {
                    allowed_states: allowedStates,
                    allowed_race_types: allowedRaceTypes,
                    allowed_districts: allowedDistricts,
                    updated_at: new Date().toISOString()
                };

                // Only allow role change for admins
                if (currentUserRole === 'admin') {
                    updateData.role = role;
                }

                const { error } = await supabase
                    .from('user_profiles')
                    .update(updateData)
                    .eq('id', userId);

                if (error) throw error;

                closeEditModal();
                loadUsers();
                showSuccess('usersContent', 'User updated successfully');
            } catch (error) {
                showError('editError', 'Failed to save changes: ' + error.message);
            }
        }

        // Create User
        async function createNewUser() {
            try {
                const email = document.getElementById('newEmail').value.trim();
                const password = document.getElementById('newPassword').value;
                const fullName = document.getElementById('newFullName').value.trim();
                const role = document.getElementById('newRole').value;
                const allowedStates = getSelectedStates('createStateCheckboxes');
                const districtInput = document.getElementById('createDistricts').value.trim();

                if (!email || !password || !fullName) {
                    showError('createError', 'Please fill in all required fields');
                    return;
                }

                if (password.length < 6) {
                    showError('createError', 'Password must be at least 6 characters');
                    return;
                }

                if (allowedStates.length === 0) {
                    showError('createError', 'Please select at least one state');
                    return;
                }

                // Create auth user
                const { data: { user }, error: authError } = await supabase.auth.admin.createUser({
                    email,
                    password,
                    email_confirm: true
                });

                if (authError) throw authError;

                // Build allowed_race_types - all race types for selected states
                let allowedRaceTypes = {};
                allowedStates.forEach(state => {
                    allowedRaceTypes[state] = RACE_TYPES;
                });

                // Build allowed_districts
                let allowedDistricts = {};
                if (districtInput) {
                    const districts = districtInput.split(',').map(d => d.trim()).filter(d => d);
                    allowedStates.forEach(state => {
                        allowedDistricts[state] = districts.filter(d => d.startsWith(state.substring(0, 2)));
                    });
                } else {
                    allowedStates.forEach(state => {
                        allowedDistricts[state] = [];
                    });
                }

                // Create user profile
                const { error: profileError } = await supabase
                    .from('user_profiles')
                    .insert([{
                        id: user.id,
                        email,
                        full_name: fullName,
                        role,
                        status: 'approved',
                        allowed_states: allowedStates,
                        allowed_race_types: allowedRaceTypes,
                        allowed_districts: allowedDistricts,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    }]);

                if (profileError) throw profileError;

                document.getElementById('createUserForm').reset();
                showSuccess('createSuccess', `User ${email} created successfully`);
                setTimeout(() => {
                    document.getElementById('createSuccess').innerHTML = '';
                }, 5000);
            } catch (error) {
                console.error('Error creating user:', error);
                showError('createError', 'Failed to create user: ' + (error.message || 'Unknown error'));
            }
        }
    </script>
</body>
</html>
