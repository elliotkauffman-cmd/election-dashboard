<!DOCTYPE html><html><head><meta charset="utf-8"><title>Election Dashboard</title>
<style>
body{background:#0a0e1a;color:#ccc;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#151a30;padding:2rem;border-radius:12px;border:1px solid #333;text-align:center;max-width:400px;width:90%}
h2{color:#00d9ff;margin-top:0}
input{background:#0a0e1a;border:1px solid #444;color:#fff;padding:0.7rem 1rem;border-radius:6px;width:100%;box-sizing:border-box;font-size:1rem;margin:1rem 0}
button{background:#00d9ff;color:#0a0e1a;border:none;padding:0.7rem 2rem;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1rem}
button:hover{background:#00b8d4}
.err{color:#ff5555;font-size:0.85rem;min-height:1.2rem}
.prog{color:#00d9ff;font-size:0.85rem}
.bar{width:100%;background:#0a0e1a;border-radius:4px;height:8px;margin-top:0.5rem;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#00d9ff,#00b8d4);transition:width 0.3s;width:0%}
</style></head><body>
<div class="box">
<h2>Election Intelligence Dashboard</h2>
<p>Enter password to access</p>
<input type="password" id="pw" placeholder="Password" autofocus>
<br><button onclick="unlock()" id="btn">Unlock</button>
<p class="err" id="err"></p>
<div class="bar" id="barWrap" style="display:none"><div class="fill" id="barFill"></div></div>
<p class="prog" id="prog" style="display:none"></p>
</div>
<script>
if(!sessionStorage.getItem("supabaseSession")){window.location.href="index.html";}
var SALT="RsM+OoAek4NkaZKZsTNAog==",IV="OaIGEBDXDTTW2TU2",TAG="3Bpw0GhyeRynFsnDxqKkpQ==";
var CHUNKS=3;
var CHUNK_FILES=["data_0.js","data_1.js","data_2.js"];
function b2a(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a}
function showProgress(msg,pct){
  document.getElementById("prog").style.display="block";
  document.getElementById("barWrap").style.display="block";
  document.getElementById("prog").textContent=msg;
  document.getElementById("barFill").style.width=pct+"%";
}
function unlock(){
  var p=document.getElementById("pw").value;if(!p)return;
  document.getElementById("btn").disabled=true;
  document.getElementById("err").textContent="";
  showProgress("Loading data...",5);
  var loaded=0;
  window._EDATA=[];
  function loadChunk(idx){
    return new Promise(function(resolve,reject){
      var s=document.createElement("script");
      s.src=CHUNK_FILES[idx]+"?v=1774177776925";
      s.onload=function(){loaded++;showProgress("Loading data "+loaded+"/"+CHUNKS+"...",5+(loaded/CHUNKS)*40);resolve();};
      s.onerror=function(){reject(new Error("Failed to load "+CHUNK_FILES[idx]));};
      document.head.appendChild(s);
    });
  }
  var chain=Promise.resolve();
  for(var i=0;i<CHUNKS;i++){(function(idx){chain=chain.then(function(){return loadChunk(idx);})})(i);}
  chain.then(function(){
    showProgress("Reassembling...",50);
    var allB64=window._EDATA.join("");
    var encBytes=b2a(allB64);
    showProgress("Decrypting...",60);
    var s=b2a(SALT),iv=b2a(IV),t=b2a(TAG);
    var combined=new Uint8Array(encBytes.length+t.length);
    combined.set(encBytes);combined.set(t,encBytes.length);
    return crypto.subtle.importKey("raw",new TextEncoder().encode(p),"PBKDF2",false,["deriveBits"])
      .then(function(rawKey){showProgress("Deriving key...",70);return crypto.subtle.deriveBits({name:"PBKDF2",salt:s,iterations:100000,hash:"SHA-256"},rawKey,256);})
      .then(function(bits){return crypto.subtle.importKey("raw",bits,"AES-GCM",false,["decrypt"]);})
      .then(function(key){showProgress("Decrypting dashboard...",80);return crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,combined);})
      .then(function(decrypted){showProgress("Rendering...",95);var htmlContent=new TextDecoder().decode(decrypted);setTimeout(function(){document.open();document.write(htmlContent);document.close();var sc=document.createElement("script");sc.src="auth_check.js";document.body.appendChild(sc);},100);});
  }).catch(function(err){
    document.getElementById("err").textContent=err.message.indexOf("Failed to load")>=0?"Data files not found":"Wrong password";
    document.getElementById("btn").disabled=false;
    showProgress("",0);
  });
}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock()});
</script></body></html>
