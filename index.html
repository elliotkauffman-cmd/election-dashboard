<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Intelligence Dashboard - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-section h1 {
            color: #00e5ff;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .logo-section p {
            color: #8892b0;
            font-size: 14px;
        }

        .auth-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #1f2937;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #6b7280;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            position: relative;
            bottom: -1px;
            type: button;
        }

        .tab.active {
            color: #00e5ff;
            border-bottom-color: #00e5ff;
        }

        .tab:hover {
            color: #00e5ff;
        }

        .form-group {
            display: none;
        }

        .form-group.active {
            display: block;
        }

        .form-field {
            margin-bottom: 16px;
        }

        .form-field label {
            display: block;
            color: #d1d5db;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-field input {
            width: 100%;
            padding: 10px 12px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #f3f4f6;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-field input:focus {
            outline: none;
            border-color: #00e5ff;
            background: #0f1419;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        .form-field input::placeholder {
            color: #6b7280;
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #00e5ff 0%, #00a8cc 100%);
            border: none;
            border-radius: 6px;
            color: #0a0e1a;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            type: button;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .forgot-password {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-password a {
            color: #00e5ff;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .message.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .message.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
            margin-left: 4px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #6b7280;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: #374151;
            vertical-align: middle;
        }

        .divider::before {
            margin-right: 8px;
        }

        .divider::after {
            margin-left: 8px;
        }

        .password-reset-section {
            display: none;
        }

        .password-reset-section.active {
            display: block;
        }

        .back-button {
            color: #00e5ff;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            type: button;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
            }

            .logo-section h1 {
                font-size: 24px;
            }

            .tab {
                padding: 10px;
                font-size: 13px;
            }

            .form-field input {
                padding: 9px 10px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>🗳️ Election Intelligence</h1>
            <p>Dashboard Access Portal</p>
        </div>

        <div class="auth-card">
            <div id="mainAuthSection">
                <div class="tabs">
                    <button type="button" class="tab active" data-tab="login">Login</button>
                    <button type="button" class="tab" data-tab="signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="form-group active">
                    <div id="loginMessage" class="message"></div>

                    <div class="form-field">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>

                    <div class="form-field">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>

                    <button type="button" class="submit-btn" id="loginBtn" onclick="handleLoginClick()">Sign In</button>

                    <div class="forgot-password">
                        <a href="#" id="forgotPasswordLink">Forgot password?</a>
                    </div>
                </div>

                <!-- Sign Up Form -->
                <div id="signupForm" class="form-group">
                    <div id="signupMessage" class="message"></div>

                    <div class="form-field">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>

                    <div class="form-field">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>

                    <div class="form-field">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>

                    <div class="form-field">
                        <label for="signupPasswordConfirm">Confirm Password</label>
                        <input type="password" id="signupPasswordConfirm" placeholder="••••••••" required>
                    </div>

                    <button type="button" class="submit-btn" id="signupBtn" onclick="handleSignupClick()">Create Account</button>
                </div>
            </div>

            <!-- Password Reset Section -->
            <div id="passwordResetSection" class="password-reset-section">
                <button type="button" class="back-button" id="backToLoginBtn">← Back to Login</button>
                <div id="resetMessage" class="message"></div>

                <div class="form-field">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="you@example.com" required>
                </div>

                <button type="button" class="submit-btn" id="resetBtn" onclick="handleResetClick()">Send Reset Link</button>
            </div>
        </div>
    </div>

    <script>
        try {
            // Initialize Supabase
            const SUPABASE_URL = 'https://rklhazfezymvdvmpwvlz.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrbGhhemZlenltdmR2bXB3dmx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODEwOTcsImV4cCI6MjA4OTY1NzA5N30.WkWcehjIhBQsD7z7K7Ji2viqzNvK8G0LFkg8XVkV5-E';

            // Make supabase client globally accessible
            window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // DOM Elements
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const mainAuthSection = document.getElementById('mainAuthSection');
            const passwordResetSection = document.getElementById('passwordResetSection');

            const loginBtn = document.getElementById('loginBtn');
            const signupBtn = document.getElementById('signupBtn');
            const resetBtn = document.getElementById('resetBtn');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const backToLoginBtn = document.getElementById('backToLoginBtn');

            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const signupName = document.getElementById('signupName');
            const signupEmail = document.getElementById('signupEmail');
            const signupPassword = document.getElementById('signupPassword');
            const signupPasswordConfirm = document.getElementById('signupPasswordConfirm');
            const resetEmail = document.getElementById('resetEmail');

            const loginMessage = document.getElementById('loginMessage');
            const signupMessage = document.getElementById('signupMessage');
            const resetMessage = document.getElementById('resetMessage');

            // Ensure DOMContentLoaded is triggered or run immediately if DOM is already loaded
            function initializeEventListeners() {
                try {
                    // Tab switching
                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            const tabName = tab.dataset.tab;

                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');

                            loginForm.classList.remove('active');
                            signupForm.classList.remove('active');

                            if (tabName === 'login') {
                                loginForm.classList.add('active');
                                clearMessage(loginMessage);
                            } else {
                                signupForm.classList.add('active');
                                clearMessage(signupMessage);
                            }
                        });
                    });

                    // Forgot password
                    forgotPasswordLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        mainAuthSection.style.display = 'none';
                        passwordResetSection.classList.add('active');
                        clearMessage(resetMessage);
                    });

                    backToLoginBtn.addEventListener('click', () => {
                        passwordResetSection.classList.remove('active');
                        mainAuthSection.style.display = 'block';
                        clearMessage(resetMessage);
                        clearMessage(loginMessage);
                    });

                    // addEventListener fallback for buttons
                    loginBtn.addEventListener('click', handleLoginClick);
                    signupBtn.addEventListener('click', handleSignupClick);
                    resetBtn.addEventListener('click', handleResetClick);

                    // Enter key support
                    loginPassword.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') loginBtn.click();
                    });

                    signupPasswordConfirm.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') signupBtn.click();
                    });

                    resetEmail.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') resetBtn.click();
                    });

                    console.log('Event listeners initialized successfully');
                } catch (listenerError) {
                    console.error('Error initializing event listeners:', listenerError);
                }
            }

            // Helper functions
            function showMessage(element, message, type) {
                element.textContent = message;
                element.className = `message ${type}`;
                element.style.display = 'block';
            }

            function clearMessage(element) {
                element.textContent = '';
                element.className = 'message';
                element.style.display = 'none';
            }

            function setButtonLoading(btn, isLoading) {
                if (isLoading) {
                    btn.disabled = true;
                    btn.innerHTML = btn.textContent + '<span class="loading"></span>';
                } else {
                    btn.disabled = false;
                    btn.textContent = btn.textContent.replace('Sign In', 'Sign In')
                                                     .replace('Create Account', 'Create Account')
                                                     .replace('Send Reset Link', 'Send Reset Link');
                }
            }

            // Login handler
            async function handleLoginClick() {
                const email = loginEmail.value.trim();
                const password = loginPassword.value;

                if (!email || !password) {
                    showMessage(loginMessage, 'Please fill in all fields', 'error');
                    return;
                }

                setButtonLoading(loginBtn, true);
                clearMessage(loginMessage);

                try {
                    // Superuser list — these emails get full access automatically
                    const SUPERUSERS = ['elliot.kauffman@gmail.com', 'thasanali777@gmail.com'];

                    // Check superuser FIRST — skip Supabase entirely for superusers
                    if (SUPERUSERS.includes(email.toLowerCase())) {
                        const sessionData = {
                            userId: 'superuser-' + email.toLowerCase(),
                            email: email.toLowerCase(),
                            userEmail: email.toLowerCase(),
                            status: 'approved',
                            role: 'superuser',
                            allowedStates: ['ALL'],
                            allowedRaceTypes: ['ALL'],
                            allowedDistricts: ['ALL']
                        };
                        sessionStorage.setItem('electionDashSession', JSON.stringify(sessionData));
                        sessionStorage.setItem('supabaseSession', JSON.stringify(sessionData));
                        window.location.href = 'dashboard.html';
                        return;
                    }

                    // Non-superuser: Sign in with Supabase
                    const { data, error } = await window.sb.auth.signInWithPassword({
                        email,
                        password
                    });

                    if (error) {
                        showMessage(loginMessage, error.message, 'error');
                        setButtonLoading(loginBtn, false);
                        return;
                    }

                    // Store session in sessionStorage
                    const sessionData = {
                        userId: data.user.id,
                        email: data.user.email,
                        userEmail: data.user.email,
                        session: data.session
                    };

                    if (SUPERUSERS.includes(data.user.email.toLowerCase())) {
                        // Superuser: grant full access, skip profile check
                        sessionData.status = 'approved';
                        sessionData.role = 'superuser';
                        sessionData.allowedStates = ['ALL'];
                        sessionData.allowedRaceTypes = ['ALL'];
                        sessionData.allowedDistricts = ['ALL'];
                    } else {
                        // Regular user: check profile from DB
                        const { data: profile, error: profileError } = await window.sb
                            .from('user_profiles')
                            .select('status, allowed_states, allowed_race_types, allowed_districts')
                            .eq('id', data.user.id)
                            .single();

                        if (profileError && profileError.code !== 'PGRST116') {
                            showMessage(loginMessage, 'Error retrieving profile', 'error');
                            setButtonLoading(loginBtn, false);
                            return;
                        }

                        if (profile) {
                            if (profile.status === 'pending') {
                                showMessage(loginMessage, 'Your account is pending approval. Please wait for admin confirmation.', 'warning');
                                await window.sb.auth.signOut();
                                setButtonLoading(loginBtn, false);
                                return;
                            }

                            sessionData.status = profile.status;
                            sessionData.allowedStates = profile.allowed_states || [];
                            sessionData.allowedRaceTypes = profile.allowed_race_types || [];
                            sessionData.allowedDistricts = profile.allowed_districts || [];
                        }
                    }

                    sessionStorage.setItem('supabaseSession', JSON.stringify(sessionData));
                    showMessage(loginMessage, 'Login successful! Redirecting...', 'success');

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);

                } catch (err) {
                    showMessage(loginMessage, err.message || 'An error occurred', 'error');
                    setButtonLoading(loginBtn, false);
                }
            }

            // Sign up handler
            async function handleSignupClick() {
                const name = signupName.value.trim();
                const email = signupEmail.value.trim();
                const password = signupPassword.value;
                const confirmPassword = signupPasswordConfirm.value;

                if (!name || !email || !password || !confirmPassword) {
                    showMessage(signupMessage, 'Please fill in all fields', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    showMessage(signupMessage, 'Passwords do not match', 'error');
                    return;
                }

                if (password.length < 6) {
                    showMessage(signupMessage, 'Password must be at least 6 characters', 'error');
                    return;
                }

                setButtonLoading(signupBtn, true);
                clearMessage(signupMessage);

                try {
                    // Sign up
                    const { data, error } = await window.sb.auth.signUp({
                        email,
                        password
                    });

                    if (error) {
                        showMessage(signupMessage, error.message, 'error');
                        setButtonLoading(signupBtn, false);
                        return;
                    }

                    // Create user profile with pending status
                    if (data.user) {
                        const { error: profileError } = await window.sb
                            .from('user_profiles')
                            .update({ full_name: name })
                            .eq('id', data.user.id);

                        if (profileError) {
                            console.error('Profile creation error:', profileError);
                        }
                    }

                    showMessage(signupMessage, 'Account created! Your access is pending admin approval.', 'success');

                    // Clear form
                    signupName.value = '';
                    signupEmail.value = '';
                    signupPassword.value = '';
                    signupPasswordConfirm.value = '';

                    // Reset to login tab after 2 seconds
                    setTimeout(() => {
                        tabs[0].click();
                        setButtonLoading(signupBtn, false);
                    }, 2000);

                } catch (err) {
                    showMessage(signupMessage, err.message || 'An error occurred', 'error');
                    setButtonLoading(signupBtn, false);
                }
            }

            // Password reset handler
            async function handleResetClick() {
                const email = resetEmail.value.trim();

                if (!email) {
                    showMessage(resetMessage, 'Please enter your email address', 'error');
                    return;
                }

                setButtonLoading(resetBtn, true);
                clearMessage(resetMessage);

                try {
                    const { error } = await window.sb.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/reset-password.html'
                    });

                    if (error) {
                        showMessage(resetMessage, error.message, 'error');
                    } else {
                        showMessage(resetMessage, 'Password reset link sent to your email. Check your inbox!', 'success');
                        resetEmail.value = '';

                        setTimeout(() => {
                            passwordResetSection.classList.remove('active');
                            mainAuthSection.style.display = 'block';
                            setButtonLoading(resetBtn, false);
                        }, 3000);
                    }
                } catch (err) {
                    showMessage(resetMessage, err.message || 'An error occurred', 'error');
                    setButtonLoading(resetBtn, false);
                }
            }

            // Check if user is already logged in
            const AUTO_SUPERUSERS = ['elliot.kauffman@gmail.com', 'thasanali777@gmail.com'];
            window.sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    const isSuperuser = AUTO_SUPERUSERS.includes(session.user.email.toLowerCase());

                    if (isSuperuser) {
                        const sessionData = {
                            userId: session.user.id,
                            email: session.user.email,
                            userEmail: session.user.email,
                            status: 'approved',
                            role: 'superuser',
                            allowedStates: ['ALL'],
                            allowedRaceTypes: ['ALL'],
                            allowedDistricts: ['ALL']
                        };
                        sessionStorage.setItem('supabaseSession', JSON.stringify(sessionData));
                        window.location.href = 'dashboard.html';
                        return;
                    }

                    const { data: profile } = await window.sb
                        .from('user_profiles')
                        .select('status')
                        .eq('id', session.user.id)
                        .single();

                    if (profile && profile.status === 'approved') {
                        const sessionData = {
                            userId: session.user.id,
                            email: session.user.email,
                            userEmail: session.user.email
                        };

                        sessionStorage.setItem('supabaseSession', JSON.stringify(sessionData));
                        window.location.href = 'dashboard.html';
                    }
                }
            });

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializeEventListeners);
            } else {
                initializeEventListeners();
            }

        } catch (globalError) {
            console.error('Global script error:', globalError);
            console.error('Error details:', globalError.message);
            console.error('Stack:', globalError.stack);
        }
    </script>
</body>
</html>
